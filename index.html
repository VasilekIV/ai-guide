<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🏛 Иднакар: Цифровой Гид</title>
  <style>
    :root { --bg: #f8f9fa; --card: #ffffff; --txt: #1a1a1a; --sec: #6c757d; --acc: #0d6efd; --acc-h: #0b5ed7; --bdr: #dee2e6; }
    [data-theme="dark"] { --bg: #0d1117; --card: #161b22; --txt: #c9d1d9; --sec: #8b949e; --acc: #58a6ff; --acc-h: #79c0ff; --bdr: #30363d; }
    * { box-sizing: border-box; transition: background .2s, color .2s; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 16px; background: var(--bg); color: var(--txt); min-height: 100vh; }
    .container { max-width: 600px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--bdr); }
    .header h1 { margin: 0; font-size: 20px; }
    .theme-btn { background: none; border: 1px solid var(--bdr); color: var(--txt); padding: 6px 10px; border-radius: 8px; cursor: pointer; }
    
    .search-box { display: flex; gap: 8px; margin-bottom: 16px; }
    input { flex: 1; padding: 12px; border: 2px solid var(--bdr); border-radius: 12px; font-size: 16px; background: var(--card); color: var(--txt); }
    input:focus { outline: none; border-color: var(--acc); }
    button { padding: 12px 16px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; background: var(--acc); color: #fff; }
    button:active { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .card { background: var(--card); padding: 16px; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 14px; border: 1px solid var(--bdr); }
    .card h3 { margin: 0 0 8px; font-size: 15px; color: var(--acc); }
    .card p { margin: 0; font-size: 14px; line-height: 1.5; color: var(--sec); white-space: pre-wrap; }
    
    #answer { min-height: 60px; }
    .voice-btn { background: var(--sec); width: 100%; margin-top: 8px; }
    .hint { font-size: 12px; color: var(--sec); margin-top: 4px; text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1> Иднакар: Цифровой Гид</h1>
    <button class="theme-btn" onclick="toggleTheme()">🌗</button>
  </div>

  <div class="search-box">
    <input type="text" id="query" placeholder="Спросите про укрепления, ремёсла, торговлю...">
    <button id="sendBtn" onclick="askAI()">🔍</button>
  </div>
  <div class="hint">💡 Примеры: «Кто основал городище?», «Чем торговали?», «Какое оружие использовали?»</div>

  <div id="context-card" class="card" style="display:none;">
    <h3>📚 Найдено в базе знаний:</h3>
    <p id="context-text"></p>
  </div>

  <div id="answer-card" class="card" style="display:none;">
    <h3>🤖 Ответ гида:</h3>
    <p id="answer"></p>
    <button class="voice-btn" onclick="speakLast()">🔊 Озвучить ответ</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  БАЗА ЗНАНИЙ (Встроена из вашего JSON)
// ══════════════════════════════════════════════════════════
const DB = {
  "metadata": { "title": "ГАЗОВСКИЙ КРАЕВЕДЧЕСКИЙ МУЗЕЙ. ГОРОДИЩЕ ИДНАКАР (IX-XIII вв.)" },
  "chunks": [
    {"id": "chunk_001", "topic": "Мифологическое происхождение", "content": "Согласно удмуртским сказаниям, на гору Солдырь пришёл богатырь Донды и остался там жить. У него было два старших сына — Идна и Гурья, а позднее на Солдыре родились ещё несколько сыновей, среди них Весья и Зуй. Когда сыновья подросли, им стало тесно: Донды с младшими сыновьями отправился вверх по Пызепу и основал городище Дондыкар; Идна остался на прежнем месте; Гурья и Весья выбрали крутые горы выше по течению р. Чепцы. Богатыри обладали сказочной силой: где не было подходящего места для крепости, они рукой вытягивали пригорок до величины горы. У каждого было своё занятие: Гурья вырубал леса и пахал землю, Идна охотился и совершал набеги, Донды занимался торговлей и промыслами. Идна, самый сильный и независимый, 'возгордился и захотел княжить над всеми удмуртами', дожил до прихода русских и как князь-эксей вёл с ними борьбу. Названия деревень Дондыкар, Весьякар, Гурьякар, Иднакар содержат два корня: имя легендарного основателя + 'кар' (удм. 'город', 'городище', 'гнездо').",
  "keywords": ["Донды", "Идна", "Гурья", "Весья", "Зуй", "Солдырь", "эксей", "мифология", "удмуртский эпос", "кар"]},
    {"id":"chunk_002","topic":"Общая информация об Иднакаре","content":"Солдырское I городище «Иднакар» — крупнейший памятник на севере Удмуртии, расположен в 2 км к западу от дер. Солдырь, в 4 км к востоку от г. Глазова. Расположено на мысу высотой до 40 м при слиянии р. Чепцы и притока Пызеп. Памятник федерального значения. Основано в конце IX века, первоначальная площадь ~10 000 кв.м, к XI в. расширено до 4 га.","keywords":["Иднакар","городище","Чепца","Пызеп","археологический памятник","Удмуртия"]},
    {"id":"chunk_003","topic":"История изучения","content":"Первые исследования: 1885-1889 гг. — А.А. Спицын и Н.Г. Первухин. 1927-1928 гг. — экспедиция С.Г. Матвеева и А.П. Смирнова. С 1954 г. — Удмуртская археологическая экспедиция под рук. В.Ф. Генинга. С 1974 г. — планомерные раскопки под рук. М.Г. Ивановой. В 1997 г. создан Историко-культурный музей-заповедник «Иднакар».","keywords":["Спицын","Первухин","Смирнов","Генинг","Иванова","раскопки","музей-заповедник"]},
    {"id":"chunk_004","topic":"Оборонительные сооружения","content":"Иднакар имел три линии укреплений (валы и рвы). Внутренняя линия — самая ранняя (конец IX в.), вторая возведена в X в. (площадь 20 000 кв.м), третья — в XI в. (площадь 4 га). Восточная часть укреплялась наиболее мощно как наиболее уязвимая. Валы из утрамбованной глины с деревянными срубами.","keywords":["валы","рвы","укрепления","оборона","планировка","крепость"]},
    {"id":"chunk_005","topic":"Жилища и хозяйственные постройки","content":"Жилища прямоугольной формы (~6×8 м, 40-45 кв.м), с очагом из утрамбованной глины в центре, крыша из дёрна/плах/луба. Вдоль стен — дощатые настилы (прообраз пола). Хозяйственные ямы глубиной до 2,5 м, обшитые досками/лубом, для хранения зерна и припасов.","keywords":["жилища","очаг","хозяйственные ямы","строительство","быт"]},
    {"id":"chunk_006","topic":"Земледелие","content":"Преобладала подсечно-огневая система. Орудия: наральники, мотыги. Возделывали: полбу-двузернянку, яровую рожь, овёс, пшеницу, ячмень, просо, репу, брюкву, горох, чечевицу, лён, коноплю. Для уборки — косы-горбуши, серпы; для обмолота — цепы; для помола — ручные жернова (найдено >100).","keywords":["земледелие","подсека","наральник","зерно","урожай","сельское хозяйство"]},
    {"id":"chunk_007","topic":"Животноводство","content":"Разводили крупный рогатый скот (коровы 105-111 см), лошадей (местный 'лесной' тип 128-136 см и 'степной' 144 см), мелкий рогатый скот, свиней, домашнюю птицу. Находки: удила, псалии, стремена, ножницы для стрижки овец, остатки шерстяной ткани.","keywords":["животноводство","коровы","лошади","упряжь","шерсть"]},
    {"id":"chunk_008","topic":"Охота и рыболовство","content":"Основные промысловые животные: бобр (кастореум — экспортный товар), лось, северный олень, белка, куница, медведь. Оружие: лук со стрелами (костяные наконечники), копья, дротики, пищики-манки из костей соболя/куницы. Рыболовство: крючки, блёсны, сети, гарпуны; найдены позвонки сома до 150 кг.","keywords":["охота","рыболовство","бобр","лук","стрелы","пушной промысел"]},
    {"id":"chunk_009","topic":"Косторезное мастерство","content":"Изделия из кости/рога: наконечники стрел, кочедыки, пряслица, ложки, гребни, копоушки, пронизки-коньки. Орнамент: геометрический (граффити), сюжетные сцены, тамги (знаки собственности). Уникальные находки: печать с знаком, варган, подставки под струны, амулеты, солярный знак-трискелис.","keywords":["кость","резьба","орнамент","гребень","амулет","тамга","варган"]},
    {"id":"chunk_010","topic":"Ювелирное ремесло","content":"Обработка цветных металлов: бронза, серебро. Технологии: ковка, штамповка, чеканка, литьё по восковым моделям, скань, зернь. Изделия: серьги, шумящие подвески, перстни, браслеты, фибулы, пряжки. Мотивы: Шунды Мумы (Мать солнца), водоплавающие птицы, кони. Импорт: рубчатые перстни (славянское влияние).","keywords":["ювелир","бронза","подвески","скань","зернь","Шунды Мумы","украшения"]},
    {"id":"chunk_011","topic":"Металлообработка и кузнечное дело","content":"Иднакар — центр железоделательного ремесла. Сырьё: бурые болотные руды (лимониты) из Ярского р-на УР и Омутнинского р-на Кировской обл. Сыродутный способ плавки в домницах. Кузнецы владели: ковкой, сваркой, цементацией. Изделия: орудия труда, оружие, бытовые предметы. Найдено 10 клещей, тигли, льячки, литейные формы.","keywords":["кузнец","железо","домница","крица","ковка","руды","металлургия"]},
    {"id":"chunk_012","topic":"Военное дело","content":"Оружие дальнего боя: сложносоставной лук (~1,3 м, сила 20-80 кг), стрелы (75-90 см) с втульчатыми/черешковыми наконечниками (двушипные, срезни, бронебойные). Защита: костяные накладки, щитки, кольца. Ближний бой: копья 1,5-2 м. Также: праща, метательные камни. Носили в налучье и колчане (~20 стрел).","keywords":["лук","стрелы","копьё","наконечник","колчан","оружие","оборона"]},
    {"id":"chunk_013","topic":"Керамика","content":"Местная красная глина с наполнителями (зола, шерсть, песок, шамот). Ленточный способ лепки. Обжиг на костре (650-800°C). Посуда: кухонная (грубая), столовая, ритуальная. Найдена также круговая керамика из Волжской Булгарии (импорт).","keywords":["керамика","глина","обжиг","посуда","гончар","импорт"]},
    {"id":"chunk_014","topic":"Музыкальная культура","content":"Найдены: варган (ымкрезь) — бронзовая пластинка 6-9 см с язычком; две костяные подставки под струны (кобылки) от щипкового инструмента типа 'пыж крезь'. Аналогии с инструментами манси (санквылтапе) и хантов (нарс-юхе).","keywords":["музыка","варган","ымкрезь","струнный инструмент","кобылка"]},
    {"id":"chunk_015","topic":"Торговые связи","content":"Водные пути: Чепца-Вятка-Кама-Волга. Импорт: византийские и среднеазиатские сосуды, булгарские чаши (XII в.), стеклянные бусы (Средиземноморье, Египет), сердоликовые/хрустальные бусы (Средняя Азия), янтарные (Прибалтика), монеты (саманидские дирхемы, английский пенни Кнута, саксонский денарий). Экспорт: меха, кастореум.","keywords":["торговля","импорт","бусы","монеты","Волжская Булгария","Византия","пушнина"]},
    {"id":"chunk_016","topic":"Кушманское городище Учкакар","content":"Расположено в Ярском р-не УР, 1,5 км от дер. Кушман. Датировка: X–XIII вв. Центр аграрно-ремесленного комплекса. Найдены: шумящие подвески, костяной медальон, ажурная фляжчатая подвеска, коньковые пронизки, новгородская посуда, куфические монеты. Уникальные находки: подвеска-птица, зооморфные пронизки из позвонков.","keywords":["Учкакар","Кушман","городище","раскопки","артефакты"]},
    {"id":"chunk_017","topic":"Погребальные памятники","content":"Могильники грунтовые, на склонах у воды. Захоронения в ямах (глубина 20-60 см), в деревянных гробах/бересте. Женские погребения: украшения (подвески, поясная гарнитура). Мужские: орудия труда, оружие. Обязательны: кресало, кремень, сосуд. Солдырский III могильник: 92 погребения, 32,3% — детские. Средняя продолжительность жизни: женщины 29,6 лет, мужчины 39,3 года.","keywords":["могильник","погребение","обряд","инвентарь","антропология","Солдырский"]},
    {"id":"chunk_018","topic":"Мифологические представления удмуртов","content":"Пантеон ~40 существ. Низшие духи: коркамурт (домовой), гидкамурт, мунчомурт (банник). Высшие: нюлесьмурт (леший), лудмурт (полевик), вумурт (водяной). Божества: Инмар (верховный), Кылдычин, Куазь; женские — Ву Мумы, Музьем Мумы, Шунды Мумы. Картина мира: трёхчастная (небо-земля-подземелье), Мировое Древо. Сакральные объекты: перекрёстки, границы, реки.","keywords":["мифология","божества","духи","Инмар","Шунды Мумы","Мировое Древо","культ"]},
    {"id":"chunk_019","topic":"Причины прекращения жизни на городищах","content":"Конец жизнедеятельности на Иднакаре — вторая половина XIII в. Версии: 1) монгольское нашествие; 2) набеги ушкуйников (древнерусские воины на речных судах); 3) экономическая (истощение ресурсов, изменение политической ситуации в Камско-Вятском междуречье).","keywords":["упадок","монголы","ушкуйники","экономика","кризис","миграция"]},
    {"id":"chunk_020","topic":"Охрана памятников","content":"Иднакар — памятник федерального значения. Закон РФ 'Об объектах культурного наследия' (2002, доп. 2013) требует сохранения археологических памятников. Угроза: 'чёрная археология' — несанкционированные раскопки с металлодетекторами уничтожают контекст и информацию, невозможную для восстановления.","keywords":["охрана","закон","чёрная археология","вандализм","сохранение наследия"]}
    {"id": "chunk_021","topic": "Образы богатырей в эпосе","content": "Удмуртский эпос наделяет каждого из сыновей Донды уникальными чертами. Идна — самый сильный, независимый, 'ни от кого не зависел, и никого не боялся'; его образ символизирует воинскую доблесть и стремление к власти. Гурья олицетворяет земледельческий труд: вырубал леса, пахал землю. Весья и Зуй упоминаются как младшие сыновья, участвовавшие в освоении новых территорий. Сам Донды — основатель рода, сочетавший земледелие с торговлей и промышленностью. Эпос подчёркивает, что богатыри не просто селились на удобных местах, но активно преобразовывали ландшафт, 'вытягивая' горы для строительства укреплений. Эти предания отражают древние представления о героическом прошлом, связи рода с землёй и сакральном статусе городищ-каров.",
  "keywords": ["Идна", "Гурья", "Весья", "Донды", "эксей", "героический эпос", "символика", "ландшафт", "родовая память"]}
  ]
};

// ═══════════════════════════════════════════════════════════
//  RAG-ПОИСК (Клиентский поиск по ключевым словам)
// ═══════════════════════════════════════════════════════════
function retrieveContext(query) {
  const q = query.toLowerCase().replace(/[^\wа-яё]/gi, ' ').split(' ').filter(w => w.length > 2);
  if (q.length === 0) return { text: "", chunks: [] };

  let scored = DB.chunks.map(chunk => {
    let score = 0;
    const fullText = (chunk.topic + ' ' + chunk.content + ' ' + chunk.keywords.join(' ')).toLowerCase();
    
    q.forEach(word => {
      if (fullText.includes(word)) score += 2;
      if (chunk.keywords.some(k => k.toLowerCase().includes(word))) score += 4;
      if (chunk.topic.toLowerCase().includes(word)) score += 3;
    });
    return { ...chunk, score };
  }).filter(c => c.score > 0).sort((a, b) => b.score - a.score).slice(0, 2);

  return {
    text: scored.map(c => `📜 [${c.topic}]\n${c.content}`).join('\n\n'),
    chunks: scored
  };
}

// ═══════════════════════════════════════════════════════════
//  ЗАПРОС К ИИ (Local llama-server)
// ═══════════════════════════════════════════════════════════
async function askAI() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.textContent = '⏳';

  // 1. RAG Retrieval
  const rag = retrieveContext(query);
  const ctxCard = document.getElementById('context-card');
  const ctxText = document.getElementById('context-text');
  
  if (rag.text) {
    ctxCard.style.display = 'block';
    ctxText.textContent = rag.text;
  } else {
    ctxCard.style.display = 'none';
  }

  // 2. Prompt Construction
  const systemPrompt = `Ты профессиональный экскурсовод Газовского краеведческого музея и специалист по городищу Иднакар.
ОТВЕЧАЙ СТРОГО НА ОСНОВЕ ПРЕДОСТАВЛЕННОГО КОНТЕКСТА. 
ПРАВИЛА:
1. Не выдумывай факты, даты и имена.
2. Если в контексте нет ответа, вежливо сообщи: "В имеющихся материалах музея эта информация не отражена."
3. Отвечай живо, но научно точно. Объём: 3-5 предложений.
4. Используй только русский язык.

КОНТЕКСТ ИЗ БАЗЫ ЗНАНИЙ:
${rag.text || "Информация не найдена."}

ВОПРОС ТУРИСТА: ${query}`;

  // 3. API Call
  try {
    const res = await fetch('http://127.0.0.1:8080/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'local',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: query }
        ],
        temperature: 0.3,
        max_tokens: 300
      })
    });
    const data = await res.json();
    const answer = data.choices[0].message.content;
    
    document.getElementById('answer-card').style.display = 'block';
    document.getElementById('answer').textContent = answer;
    window.lastAnswer = answer;
  } catch (e) {
    document.getElementById('answer-card').style.display = 'block';
    document.getElementById('answer').textContent = '⚠️ Ошибка подключения к ИИ. Убедитесь, что запущен llama-server на порту 8080.';
  } finally {
    btn.disabled = false; btn.textContent = '🔍';
  }
}

// ═══════════════════════════════════════════════════════════
// 🔊 ОЗВУЧКА & ТЕМА
// ═══════════════════════════════════════════════════════════
function speakLast() {
  if (!window.lastAnswer) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(window.lastAnswer);
  u.lang = 'ru-RU'; u.rate = 0.95;
  window.speechSynthesis.speak(u);
}

function toggleTheme() {
  const d = document.documentElement.getAttribute('data-theme');
  const n = d === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', n);
  localStorage.setItem('theme', n);
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
  
  document.getElementById('query').addEventListener('keypress', e => {
    if (e.key === 'Enter') askAI();
  });
});
</script>
